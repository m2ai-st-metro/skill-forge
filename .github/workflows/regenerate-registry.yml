name: Regenerate registry.yaml

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'src/build_registry.py'

permissions:
  contents: write

concurrency:
  group: regenerate-registry
  cancel-in-progress: false

jobs:
  regenerate:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Regenerate registry.yaml
        run: python src/build_registry.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- registry.yaml; then
            echo "No registry changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add registry.yaml
          git commit -m "chore(forge): regenerate registry.yaml [skip ci]"
          git push origin main
